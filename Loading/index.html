<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading v3</title>
  <style>
    :root {
      --loader-time: 2s;
      --loader-dash-time: 2s;
      --loader-size: 56px;        /* SVG 尺寸 = 圈圈外緣直徑 */
      --loader-stroke-width: 3px;
      --loader-stroke-color: #353535;
      --loader-easing: cubic-bezier(0.4, 0, 0.2, 1);
      --loader-stroke-linecap: round;
    }

    /* =========================================
       ➊ 頁面基礎排版
       ========================================= */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Verdana, sans-serif;
      background-color: #ffffff;
      color: #353535;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 頂部導覽列 */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .avatar-wrapper {
      position: relative;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background-color: #F7E1EB;
      color: #6E2343;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.2s;
    }

    .avatar:hover {
      opacity: 0.8;
    }


    /* 主內容區塊 */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px;
    }

    h2 {
      font-size: 24px;
      line-height: 32px;
      margin: 8px 0 24px;
      font-weight: 600;
    }

    p {
      width: 100%;
      font-size: 14px;
      line-height: 20px;
      color: #666;
      margin: 0 0 32px 0;
      padding: 28px 0;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    .btn-refresh {
      width: 180px;
      height: 42px;
      background-color: #474747;
      color: white;
      border: none;
      padding: 0;
      border-radius: 21px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-refresh:hover {
      background-color: #333;
    }

    /* 動態容器 */
    .loader-container {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* =========================================
       ➋ CSS Loader 樣式 (Clip-Path / SVG Circular Spinner)
       ========================================= */
    .general_spin {
      display: flex;
      align-items: center;
      justify-content: center;

      svg {
        width: var(--loader-size);
        height: var(--loader-size);
        display: block;
        transform-origin: center;
        animation: rotate var(--loader-time) linear infinite;
      }

      circle {
        fill: none;
        stroke: var(--loader-stroke-color);
        stroke-width: var(--loader-stroke-width);
        stroke-linecap: var(--loader-stroke-linecap);
        stroke-dasharray: 1, 360;
        stroke-dashoffset: 0;
        animation: dash var(--loader-dash-time) var(--loader-easing) infinite;
      }
    }

    @keyframes rotate {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes dash {
      0% {
        stroke-dasharray: 1, 360;
        stroke-dashoffset: 0;
      }

      50% {
        /* 💡 絲滑解法 3：讓火車拉長到 270 單位（3/4 圓周），產生更飽滿、滑順的收展張力 */
        stroke-dasharray: 270, 360;
        /* 火車頭順時針往前跑 90 單位，拉出弧線 */
        stroke-dashoffset: -90;
      }

      100% {
        stroke-dasharray: 1, 360;
        /* 💡 絲滑解法 4：關鍵修正！終點 dashoffset 必須為 -360 的整倍數。
           因為 -360 剛好是完整一圈，視覺上與 0% 的起點位置 100% 吻合，
           這樣在動畫循環（Loop）的瞬間才不會有任何肉眼可見的「瞬間跳動」或「卡頓感」！ */
        stroke-dashoffset: -360;
      }
    }

    /* =========================================
       ➌ 調整面板 (Settings Panel) 樣式
       ========================================= */
    .settings-panel {
      position: absolute;
      top: 55px;
      right: 0;
      width: 330px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(209, 213, 219, 0.3);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), 0 1px 8px rgba(0, 0, 0, 0.05);
      padding: 20px;
      display: none;
      z-index: 100;
      text-align: left;
      flex-direction: column;
      gap: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .settings-panel.show {
      display: flex;
      animation: fadeInScale 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes fadeInScale {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(-10px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .settings-panel h3 {
      margin: 0 0 4px 0;
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      padding-bottom: 10px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setting-group label {
      font-size: 13px;
      font-weight: 600;
      color: #4a4a4a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }



    .setting-group input[type="number"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .setting-group input[type="number"]:focus {
      border-color: #0066cc;
    }

    .input-with-desc {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-with-desc .desc {
      font-size: 11px;
      color: #888;
      line-height: 14px;
    }

    .color-picker-wrapper {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .color-picker-wrapper input[type="color"] {
      -webkit-appearance: none;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 8px;
    }

    .color-picker-wrapper input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      text-transform: uppercase;
      font-family: monospace;
    }

    .preset-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    .btn-preset {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fdfdfd;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .btn-preset:hover {
      background: #f0f7ff;
      border-color: #99c2ff;
      color: #0066cc;
    }

    .btn-preset.active {
      background: #e6f0fa;
      border-color: #0066cc;
      color: #0066cc;
      font-weight: 600;
    }

    .bezier-editor-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .bezier-editor-container.disabled {
      opacity: 0.55;
      pointer-events: none;
      filter: grayscale(0.5);
      cursor: not-allowed;
    }

    .bezier-editor-container input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      font-family: monospace;
      transition: border-color 0.2s;
    }

    .bezier-editor-container input[type="text"]:focus {
      border-color: #0066cc;
    }

    .bezier-svg {
      background: #ffffff;
      border-radius: 8px;
      border: 1px dashed #e0e0e0;
      touch-action: none;
    }

    .bezier-value-display {
      font-size: 12px;
      background: #eef5fc;
      color: #0066cc;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: monospace;
      width: 100%;
      text-align: center;
    }

    .page-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .btn-login {
      width: 352px;
      height: 42px;
      background-color: #0575E5;
      border: none;
      border-radius: 1000px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 102, 204, 0.2);
      transition: background-color 0.2s, transform 0.1s;
      outline: none;
    }

    .btn-login:hover {
      background-color: #0052a3;
    }

    .btn-login:active {
      transform: scale(0.98);
    }
  </style>
</head>

    <div class="avatar-wrapper">
      <div class="avatar" id="avatarBtn">W</div>

      <!-- 動態調整視窗 (Settings Panel) -->
      <div class="settings-panel" id="settingsPanel">
        <h3>Loader 調整面板</h3>

        <!-- 頁面選擇 -->
        <div class="setting-group"
          style="border-bottom: 1px solid rgba(0,0,0,0.06); padding-bottom: 12px; margin-bottom: 4px;">
          <label>選擇頁面</label>
          <div class="preset-buttons" id="pageSelector">
            <button type="button" class="btn-preset active" data-page="fti">FTI</button>
            <button type="button" class="btn-preset" data-page="login">Login</button>

        <!-- 秒數調整 -->

          <div class="input-with-desc">
            <input type="number" id="inputSeconds" value="2.0" step="0.1" min="0.5" max="10" />
            <span class="desc">（旋轉與伸縮秒數已鎖定同步，以維持固定的起點循環）</span>
          </div>

        <!-- 尺寸調整 -->
        <div class="setting-group">
          <label for="inputSize">Loader 尺寸 (width) (px)</label>
          <input type="number" id="inputSize" min="14" max="150" value="56" />
        </div>

        <!-- 粗細調整 -->
        <div class="setting-group">
          <label for="inputStrokeWidth">Loader 粗細 (px)</label>
          <input type="number" id="inputStrokeWidth" min="1" max="15" value="3" step="0.5" />
        </div>

        <!-- Stroke cap 切換 -->
        <div class="setting-group">
          <label>Stroke Cap</label>
          <div class="preset-buttons" id="strokeCapSelector">

        <!-- 顏色調整 -->
        <div class="setting-group">
          <label for="inputColor">Loader 顏色</label>

        <!-- 動態曲線調整 -->
        <div class="setting-group">

            <button type="button" class="btn-preset" data-type="default">Cubic-1</button>
            <button type="button" class="btn-preset" data-type="custom">Customized</button>

          <!-- 可拖曳的貝氏曲線編輯器 -->
          <div class="bezier-editor-container" id="bezierEditorContainer">
            <!-- 直接輸入貝氏曲線數值 -->
            <div class="setting-group" style="width: 100%; gap: 4px;">
              <label for="inputBezierText" style="font-size: 12px; font-weight: 500; color: #666;">曲線數值 (x1, y1, x2,
                y2)</label>
              <input type="text" id="inputBezierText" value="0.4, 0, 0.2, 1" placeholder="例如: 0.4, 0, 0.2, 1"
                disabled />
            </div>

            <svg class="bezier-svg" id="bezierSvg" width="150" height="150" viewBox="0 0 150 150">
              <!-- 背景網格 -->
              <line x1="15" y1="15" x2="135" y2="15" stroke="#f0f0f0" stroke-width="1" />
              <line x1="15" y1="135" x2="135" y2="135" stroke="#f0f0f0" stroke-width="1" />
              <line x1="15" y1="15" x2="15" y2="135" stroke="#f0f0f0" stroke-width="1" />
              <line x1="135" y1="15" x2="135" y2="135" stroke="#f0f0f0" stroke-width="1" />
              <!-- 對角對照線 -->
              <line x1="15" y1="135" x2="135" y2="15" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2,2" />

              <!-- 貝氏曲線本體 -->
              <path id="bezierCurvePath" d="M 15 135 C 63 135, 39 15, 135 15" fill="none" stroke="#0066cc"
                stroke-width="3" />

              <!-- 控制點 1 連線與把手 -->
              <line id="handleLine1" x1="15" y1="135" x2="63" y2="135" stroke="#a0a0a0" stroke-width="1.5" />
              <circle id="controlPoint1" cx="63" cy="135" r="7" fill="#0066cc" stroke="#fff" stroke-width="2"
                style="cursor: move;" />

              <!-- 控制點 2 連線與把手 -->
              <line id="handleLine2" x1="135" y1="15" x2="39" y2="15" stroke="#a0a0a0" stroke-width="1.5" />
              <circle id="controlPoint2" cx="39" cy="15" r="7" fill="#ff3366" stroke="#fff" stroke-width="2"
                style="cursor: move;" />
            </svg>
            <div class="bezier-value-display">
              <code>cubic-bezier(<span id="bezierVal">0.4, 0, 0.2, 1</span>)</code>
            </div>
          </div>
        </div>
      </div>

  <main>
    <!-- FTI 頁面內容 -->
    <div id="pageFti" class="page-content">
      <div class="loader-container">
        <div class="general_spin">
          <svg viewBox="0 0 56 56">
            <circle cx="28" cy="28" r="26.5" pathLength="360" />
          </svg>
        </div>
      </div>
      <h2>Updating <span id="packageName">Synology Drive</span> (<span id="progressNumber">3</span>/18)</h2>
      <p>Package update may take some time. You can sign in to DSM 7.4 now, and the updates will continue in the
        background. Please do not shut down the system during this process.</p>
      <button class="btn-refresh">Refresh</button>
    </div>

    <!-- Login 頁面內容 -->
    <div id="pageLogin" class="page-content" style="display: none;">
      <button class="btn-login">
        <div class="general_spin">
          <svg viewBox="0 0 18 18">
            <circle cx="9" cy="9" r="8" pathLength="360" />
          </svg>
        </div>
      </button>
    </div>
  </main>

  <script>
    (function () {
      // --- ➊ 調整面板控制邏輯 ---
      const avatarBtn = document.getElementById('avatarBtn');
      const settingsPanel = document.getElementById('settingsPanel');

      // 點擊頭像開關面板
      avatarBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        settingsPanel.classList.toggle('show');
      });

      // 點擊面板內部不關閉
      settingsPanel.addEventListener('click', (e) => {
        e.stopPropagation();
      });

      // 點擊外部關閉面板
      document.addEventListener('click', () => {
        settingsPanel.classList.remove('show');
      });

      // --- ➋ 幾何更新：viewBox 1:1，r = size/2 − strokeWidth/2 ---
      function updateSvgGeometry(size, strokeWidth) {
        const half = size / 2;
        const r    = half - strokeWidth / 2;
        document.querySelectorAll('.general_spin svg').forEach(svg => {
          svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
        });
        document.querySelectorAll('.general_spin circle').forEach(circle => {
          circle.setAttribute('cx', half);
          circle.setAttribute('cy', half);
          circle.setAttribute('r',  r);
        });
      }

      // --- 控制元件宣告 ---
      const inputSeconds = document.getElementById('inputSeconds');
      const inputSize = document.getElementById('inputSize');
      const inputStrokeWidth = document.getElementById('inputStrokeWidth');
      const inputColor = document.getElementById('inputColor');
      const inputColorText = document.getElementById('inputColorText');

      // --- ➌ 頁面狀態與切換機制 ---
      const pageStates = {
        fti: {
          seconds: 2.0,
          size: 56,
          strokeWidth: 3,
          strokeCap: 'square',
          color: '#353535',
          preset: 'ease-in-out',
          bezierText: '0.30, 0.00, 0.30, 1.00',
          bezierCoords: [0.30, 0.00, 0.30, 1.00]
        },
        login: {
          seconds: 2.0,
          size: 18,
          strokeWidth: 2,
          strokeCap: 'round',
          color: '#ffffff',
          preset: 'ease-in-out',
          bezierText: '0.30, 0.00, 0.30, 1.00',
          bezierCoords: [0.30, 0.00, 0.30, 1.00]
        }
      };
      let currentPage = 'fti';

      // 1. 秒數連動調整
      inputSeconds.addEventListener('input', () => {
        let val = parseFloat(inputSeconds.value);
        if (!isNaN(val) && val > 0) {
          const timeStr = val + 's';
          document.documentElement.style.setProperty('--loader-time', timeStr);
          document.documentElement.style.setProperty('--loader-dash-time', timeStr);
          pageStates[currentPage].seconds = val;
        }
      });

      inputSeconds.addEventListener('change', () => {
        let val = parseFloat(inputSeconds.value);
        if (isNaN(val) || val < 0.5) val = 0.5;
        if (val > 10) val = 10;
        inputSeconds.value = val;
        const timeStr = val + 's';
        document.documentElement.style.setProperty('--loader-time', timeStr);
        document.documentElement.style.setProperty('--loader-dash-time', timeStr);
        pageStates[currentPage].seconds = val;
      });

      // 2. 尺寸調整
      inputSize.addEventListener('input', () => {
        let val = parseFloat(inputSize.value);
        if (!isNaN(val) && val > 0) {
          document.documentElement.style.setProperty('--loader-size', val + 'px');
          updateSvgGeometry(val, parseFloat(inputStrokeWidth.value));
          pageStates[currentPage].size = val;
        }
      });

      inputSize.addEventListener('change', () => {
        let val = parseFloat(inputSize.value);
        if (isNaN(val) || val < 4) val = 4;
        if (val > 150) val = 150;
        inputSize.value = val;
        document.documentElement.style.setProperty('--loader-size', val + 'px');
        updateSvgGeometry(val, parseFloat(inputStrokeWidth.value));
        pageStates[currentPage].size = val;
      });

      // 3. 粗細調整
      inputStrokeWidth.addEventListener('input', () => {
        let val = parseFloat(inputStrokeWidth.value);
        if (!isNaN(val) && val > 0) {
          document.documentElement.style.setProperty('--loader-stroke-width', val + 'px');
          updateSvgGeometry(parseFloat(inputSize.value), val);
          pageStates[currentPage].strokeWidth = val;
        }
      });

      inputStrokeWidth.addEventListener('change', () => {
        let val = parseFloat(inputStrokeWidth.value);
        if (isNaN(val) || val < 0.5) val = 0.5;
        if (val > 15) val = 15;
        inputStrokeWidth.value = val;
        document.documentElement.style.setProperty('--loader-stroke-width', val + 'px');
        updateSvgGeometry(parseFloat(inputSize.value), val);
        pageStates[currentPage].strokeWidth = val;
      });

      // 4. 顏色調整 (Picker 與 Text 連動)
      function updateColor(hexColor) {
        document.documentElement.style.setProperty('--loader-stroke-color', hexColor);
        pageStates[currentPage].color = hexColor;
      }

      inputColor.addEventListener('input', () => {
        const val = inputColor.value;
        inputColorText.value = val;
        updateColor(val);
      });

      inputColorText.addEventListener('input', () => {
        let val = inputColorText.value;
        if (!val.startsWith('#')) {
          val = '#' + val;
        }
        if (/^#[0-9A-F]{6}$/i.test(val)) {
          inputColor.value = val;
          updateColor(val);
        }
      });

      // 5. Stroke cap 切換
      const strokeCapSelector = document.getElementById('strokeCapSelector');
      strokeCapSelector.querySelectorAll('.btn-preset').forEach(btn => {
        btn.addEventListener('click', () => {
          const cap = btn.getAttribute('data-cap');
          document.documentElement.style.setProperty('--loader-stroke-linecap', cap);
          pageStates[currentPage].strokeCap = cap;
          strokeCapSelector.querySelectorAll('.btn-preset').forEach(b => b.classList.toggle('active', b === btn));
        });
      });

      // --- ➍ 可拖曳貝氏曲線編輯器 (Pointer Events) ---
      const bezierSvg = document.getElementById('bezierSvg');
      const bezierCurvePath = document.getElementById('bezierCurvePath');
      const handleLine1 = document.getElementById('handleLine1');
      const handleLine2 = document.getElementById('handleLine2');
      const controlPoint1 = document.getElementById('controlPoint1');
      const controlPoint2 = document.getElementById('controlPoint2');
      const bezierVal = document.getElementById('bezierVal');

      const easingSelector = document.getElementById('easingSelector');
      const presetButtons = easingSelector.querySelectorAll('.btn-preset');
      const bezierEditorContainer = document.getElementById('bezierEditorContainer');
      const inputBezierText = document.getElementById('inputBezierText');

      // 編輯器幾何變數：
      // SVG 尺寸為 150x150，邊距為 15px，所以實際 [0, 1] 範圍映射至像素區間 [15, 135] (跨距 120px)
      const cp1 = { x: 63, y: 135 }; // P1 (0.4, 0)
      const cp2 = { x: 39, y: 15 };  // P2 (0.2, 1)
      let currentPreset = 'default';

      // 解析貝氏曲線數值文字 (格式: x1, y1, x2, y2)
      function parseBezierText(text) {
        const regex = /^\s*(-?\d*\.?\d+)\s*,\s*(-?\d*\.?\d+)\s*,\s*(-?\d*\.?\d+)\s*,\s*(-?\d*\.?\d+)\s*$/;
        const match = text.match(regex);
        if (match) {
          const x1 = parseFloat(match[1]);
          const y1 = parseFloat(match[2]);
          const x2 = parseFloat(match[3]);
          const y2 = parseFloat(match[4]);

          if (x1 >= 0 && x1 <= 1 && x2 >= 0 && x2 <= 1) {
            return [x1, y1, x2, y2];
          }
        }
        return null;
      }

      function updateBezierSvgAndCssOnly(x1, y1, x2, y2) {
        // 更新像素點
        cp1.x = 15 + 120 * x1;
        cp1.y = 135 - 120 * y1;
        cp2.x = 15 + 120 * x2;
        cp2.y = 135 - 120 * y2;

        // 更新把手小圓點位置
        controlPoint1.setAttribute('cx', cp1.x);
        controlPoint1.setAttribute('cy', cp1.y);
        controlPoint2.setAttribute('cx', cp2.x);
        controlPoint2.setAttribute('cy', cp2.y);

        // 更新把手連線
        handleLine1.setAttribute('x2', cp1.x);
        handleLine1.setAttribute('y2', cp1.y);
        handleLine2.setAttribute('x2', cp2.x);
        handleLine2.setAttribute('y2', cp2.y);

        // 更新貝氏曲線 C 指令路徑
        bezierCurvePath.setAttribute('d', `M 15 135 C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, 135 15`);

        const bezierString = `${x1.toFixed(2)}, ${y1.toFixed(2)}, ${x2.toFixed(2)}, ${y2.toFixed(2)}`;
        bezierVal.textContent = bezierString;

        // 套用動態 CSS 變數
        document.documentElement.style.setProperty('--loader-easing', `cubic-bezier(${bezierString})`);

        // 儲存狀態
        pageStates[currentPage].bezierText = bezierString;
        pageStates[currentPage].bezierCoords = [x1, y1, x2, y2];
      }

      function updateBezierUI() {
        // 將像素映射回 [0, 1] 實數範圍
        const x1 = Math.max(0, Math.min(1, (cp1.x - 15) / 120));
        const y1 = (135 - cp1.y) / 120;
        const x2 = Math.max(0, Math.min(1, (cp2.x - 15) / 120));
        const y2 = (135 - cp2.y) / 120;

        const x1Str = x1.toFixed(2);
        const y1Str = y1.toFixed(2);
        const x2Str = x2.toFixed(2);
        const y2Str = y2.toFixed(2);

        const bezierString = `${x1Str}, ${y1Str}, ${x2Str}, ${y2Str}`;

        // 更新把手小圓點與連線及路徑
        controlPoint1.setAttribute('cx', cp1.x);
        controlPoint1.setAttribute('cy', cp1.y);
        controlPoint2.setAttribute('cx', cp2.x);
        controlPoint2.setAttribute('cy', cp2.y);

        handleLine1.setAttribute('x2', cp1.x);
        handleLine1.setAttribute('y2', cp1.y);
        handleLine2.setAttribute('x2', cp2.x);
        handleLine2.setAttribute('y2', cp2.y);

        bezierCurvePath.setAttribute('d', `M 15 135 C ${cp1.x} ${cp1.y}, ${cp2.x} ${cp2.y}, 135 15`);

        bezierVal.textContent = bezierString;
        inputBezierText.value = bezierString;

        // 套用動態 CSS 變數
        document.documentElement.style.setProperty('--loader-easing', `cubic-bezier(${bezierString})`);

        // 儲存狀態
        pageStates[currentPage].bezierText = bezierString;
        pageStates[currentPage].bezierCoords = [x1, y1, x2, y2];
      }

      function setBezierCoords(x1, y1, x2, y2) {
        cp1.x = 15 + 120 * x1;
        cp1.y = 135 - 120 * y1;
        cp2.x = 15 + 120 * x2;
        cp2.y = 135 - 120 * y2;

        updateBezierUI();
      }

      function setActivePreset(type) {
        currentPreset = type;
        pageStates[currentPage].preset = type; // 儲存當前頁面的 preset

        presetButtons.forEach(btn => {
          if (btn.getAttribute('data-type') === type) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });

        if (type === 'ease-in-out') {
          bezierEditorContainer.classList.add('disabled');
          inputBezierText.disabled = true;
          setBezierCoords(0.30, 0.00, 0.30, 1.00);
        } else if (type === 'default') {
          bezierEditorContainer.classList.add('disabled');
          inputBezierText.disabled = true;
          setBezierCoords(0.4, 0, 0.2, 1);
        } else if (type === 'custom') {
          bezierEditorContainer.classList.remove('disabled');
          inputBezierText.disabled = false;

          // 切換至 Customized 時，採用當前輸入框中的值
          const coords = parseBezierText(inputBezierText.value) || [0.4, 0, 0.2, 1];
          setBezierCoords(coords[0], coords[1], coords[2], coords[3]);
        }
      }

      // 綁定 Presets 按鈕點擊事件
      presetButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          setActivePreset(btn.getAttribute('data-type'));
        });
      });

      // 監聽文字輸入框即時變更
      inputBezierText.addEventListener('input', () => {
        if (currentPreset !== 'custom') return;
        const coords = parseBezierText(inputBezierText.value);
        if (coords) {
          updateBezierSvgAndCssOnly(coords[0], coords[1], coords[2], coords[3]);
        }
      });

      // 監聽文字輸入框失去焦點 normalize 或是還原
      inputBezierText.addEventListener('blur', () => {
        if (currentPreset !== 'custom') return;
        const coords = parseBezierText(inputBezierText.value);
        if (coords) {
          setBezierCoords(coords[0], coords[1], coords[2], coords[3]);
        } else {
          // 輸入無效格式，還原為當前 SVG 內部狀態
          updateBezierUI();
        }
      });

      // 處理拖曳事件
      let activeCP = null;

      bezierSvg.addEventListener('pointerdown', (e) => {
        if (currentPreset !== 'custom') return; // 只有在 Customized 模式下才可以拖曳
        if (e.target === controlPoint1) {
          activeCP = 'cp1';
          controlPoint1.setPointerCapture(e.pointerId);
        } else if (e.target === controlPoint2) {
          activeCP = 'cp2';
          controlPoint2.setPointerCapture(e.pointerId);
        }
      });

      bezierSvg.addEventListener('pointermove', (e) => {
        if (!activeCP) return;

        const rect = bezierSvg.getBoundingClientRect();
        const x_client = e.clientX - rect.left;
        const y_client = e.clientY - rect.top;

        // 計算 SVG 內部視體坐標 (150x150)
        const svg_x = (x_client / rect.width) * 150;
        const svg_y = (y_client / rect.height) * 150;

        // 限制 X 必須在 [0, 1] 範圍內，即 [15, 135]
        const constrained_x = Math.max(15, Math.min(135, svg_x));
        // 限制 Y 可以稍微超出 [0, 1] 範圍以利過沖/回彈 (overshoot)，對應 [-0.3, 1.3] => [-21, 171]
        const constrained_y = Math.max(-21, Math.min(171, svg_y));

        if (activeCP === 'cp1') {
          cp1.x = constrained_x;
          cp1.y = constrained_y;
        } else if (activeCP === 'cp2') {
          cp2.x = constrained_x;
          cp2.y = constrained_y;
        }

        updateBezierUI();
      });

      bezierSvg.addEventListener('pointerup', (e) => {
        if (activeCP) {
          if (activeCP === 'cp1') {
            controlPoint1.releasePointerCapture(e.pointerId);
          } else if (activeCP === 'cp2') {
            controlPoint2.releasePointerCapture(e.pointerId);
          }
          activeCP = null;
        }
      });

      // --- ➎ 頁面選擇與初始化 ---
      const pageSelector = document.getElementById('pageSelector');

      function applyStateToUiAndCss(page) {
        currentPage = page;

        // 1. 更新輸入框的值
        inputSeconds.value = pageStates[page].seconds;
        inputSize.value = pageStates[page].size;
        inputStrokeWidth.value = pageStates[page].strokeWidth;
        inputColor.value = pageStates[page].color;
        inputColorText.value = pageStates[page].color;
        inputBezierText.value = pageStates[page].bezierText;

        // 2. 套用 CSS 變數至 :root
        const timeStr = pageStates[page].seconds + 's';
        document.documentElement.style.setProperty('--loader-time', timeStr);
        document.documentElement.style.setProperty('--loader-dash-time', timeStr);
        document.documentElement.style.setProperty('--loader-size', pageStates[page].size + 'px');
        document.documentElement.style.setProperty('--loader-stroke-width', pageStates[page].strokeWidth + 'px');
        updateSvgGeometry(pageStates[page].size, pageStates[page].strokeWidth);
        document.documentElement.style.setProperty('--loader-stroke-color', pageStates[page].color);
        document.documentElement.style.setProperty('--loader-stroke-linecap', pageStates[page].strokeCap);

        // 3. 切換頁面選擇按鈕的 active 樣式
        pageSelector.querySelectorAll('.btn-preset').forEach(btn => {
          if (btn.getAttribute('data-page') === page) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });

        // 4. 切換頁面內容顯示
        document.getElementById('pageFti').style.display = (page === 'fti' ? 'flex' : 'none');
        document.getElementById('pageLogin').style.display = (page === 'login' ? 'flex' : 'none');

        // 5. 同步 Stroke Cap 按鈕 active 狀態
        strokeCapSelector.querySelectorAll('.btn-preset').forEach(btn => {
          btn.classList.toggle('active', btn.getAttribute('data-cap') === pageStates[page].strokeCap);
        });

        // 6. 切換動態曲線 Preset 與貝氏曲線繪製
        setActivePreset(pageStates[page].preset);

        // 如果是 custom 模式，另外調用 setBezierCoords 以防 inputBezierText.value 的值被 parse
        if (pageStates[page].preset === 'custom') {
          const coords = pageStates[page].bezierCoords;
          setBezierCoords(coords[0], coords[1], coords[2], coords[3]);
        }
      }

      // 綁定頁面選擇按鈕點擊事件
      pageSelector.querySelectorAll('.btn-preset').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = btn.getAttribute('data-page');
          if (page && page !== currentPage) {
            applyStateToUiAndCss(page);
          }
        });
      });

      // 初始化頁面為 FTI
      applyStateToUiAndCss('fti');

      // --- ➏ 模擬進度更新 ---
      let step = 3;
      const packages = [
        "Synology Drive", "Docker", "Active Backup", "Hyper Backup",
        "Surveillance Station", "Virtual Machine Manager", "Audio Station"
      ];

      setInterval(() => {
        if (currentPage === 'fti') {
          if (step < 18) step++; else step = 1;
          document.getElementById('progressNumber').textContent = step;
          document.getElementById('packageName').textContent = packages[Math.floor(Math.random() * packages.length)];
        }
      }, 3000);
    })();
  </script>
</body>

</html>
